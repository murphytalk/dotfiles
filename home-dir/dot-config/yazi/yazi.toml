# ~/.config/yazi/yazi.toml

[opener]
play = [
  { run = 'mpv --volume=0 "$@"', orphan = true, for = "unix" },
  { run = '"C:\Program Files\mpv.exe" %*', orphan = true, for = "windows" },
]

pdf = [{ run = 'zathura "$@"', orphan = true, for = "unix" }]

[open]
rules = [
  { name = "*.pdf", use = ["pdf"] },
  { mime = "text/*", use = "edit" },
  { mime = "video/*", use = "play" },

  # { mime = "application/json", use = "edit" },
  { name = "*.json", use = "edit" },

  # Multiple openers for a single rule
  { name = "*.html", use = ["open", "edit"] },
]
